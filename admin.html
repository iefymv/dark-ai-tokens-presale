<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DARK AI TOKENS — заявки</title>
  <style>
    :root{--bg:#060908;--panel:#0d1210;--line:#26352f;--green:#79f7b2;--muted:#8ca097;--white:#edf7f2;--amber:#ffb84d;--red:#ff6571}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--white);font:14px/1.45 Inter,Arial,sans-serif}.wrap{width:min(1280px,calc(100% - 32px));margin:auto}.top{display:flex;justify-content:space-between;align-items:center;padding:24px 0;border-bottom:1px solid var(--line)}h1{margin:0;font-size:24px}.brand{color:var(--green)}button,input,select{font:inherit}.btn{padding:10px 14px;border:1px solid var(--line);background:#111915;color:var(--white);cursor:pointer}.btn:hover{border-color:var(--green)}.login{max-width:430px;margin:15vh auto;padding:28px;border:1px solid var(--line);background:var(--panel)}.login h2{margin-top:0}.login input{width:100%;padding:13px;margin:10px 0;border:1px solid var(--line);background:#070a09;color:#fff}.login .btn{width:100%;background:var(--green);color:#051009;font-weight:800}.error{color:var(--red);min-height:20px}.dashboard{display:none}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:24px 0}.stat{padding:20px;border:1px solid var(--line);background:var(--panel)}.stat span{display:block;color:var(--muted);font-size:11px;text-transform:uppercase}.stat b{display:block;margin-top:8px;color:var(--green);font-size:28px}.tools{display:flex;gap:10px;margin-bottom:14px}.tools input,.tools select{padding:11px;border:1px solid var(--line);background:var(--panel);color:#fff}.tools input{flex:1}.table{overflow:auto;border:1px solid var(--line)}table{width:100%;min-width:1050px;border-collapse:collapse}th,td{padding:13px 14px;text-align:left;border-bottom:1px solid var(--line)}th{position:sticky;top:0;background:#101713;color:var(--muted);font-size:11px}tr:hover td{background:#0c1511}.packs{color:var(--amber);white-space:nowrap}.lang{color:var(--green);text-transform:uppercase}.empty{padding:35px;text-align:center;color:var(--muted)}@media(max-width:720px){.stats{grid-template-columns:1fr 1fr}.tools{flex-wrap:wrap}.tools input{flex-basis:100%}}
  </style>
</head>
<body><div class="wrap">
  <div id="login" class="login"><h2>Доступ к заявкам</h2><p style="color:var(--muted)">Введите пароль администратора.</p><input id="password" type="password" autocomplete="current-password" placeholder="Пароль"><button id="enter" class="btn">Открыть</button><div id="loginError" class="error"></div></div>
  <main id="dashboard" class="dashboard"><header class="top"><h1><span class="brand">DARK AI TOKENS</span> / ЗАЯВКИ</h1><div><button id="refresh" class="btn">Обновить</button> <button id="csv" class="btn">Скачать CSV</button> <button id="logout" class="btn">Выйти</button></div></header>
    <section class="stats"><div class="stat"><span>Всего заявок</span><b id="count">0</b></div><div class="stat"><span>Общая сумма</span><b id="amount">$0</b></div><div class="stat"><span>Всего units</span><b id="units">0</b></div><div class="stat"><span>За последние 24 часа</span><b id="today">0</b></div></section>
    <div class="tools"><input id="search" placeholder="Поиск по email, телефону или стране"><select id="language"><option value="">Все языки</option><option value="en">EN</option><option value="ru">RU</option><option value="es">ES</option></select></div>
    <div class="table"><table><thead><tr><th>Дата</th><th>Email</th><th>Телефон</th><th>Язык</th><th>Пакеты</th><th>Сумма</th><th>Units</th><th>Страна</th></tr></thead><tbody id="rows"></tbody></table><div id="empty" class="empty">Заявок пока нет</div></div>
  </main>
</div><script>
let leads=[],token=sessionStorage.getItem('adminToken')||'';const $=s=>document.querySelector(s);
const esc=v=>String(v??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function packages(v){try{let p=typeof v==='string'?JSON.parse(v):v;return [20,100,200].filter(x=>p[x]).map(x=>`${p[x]}×$${x}`).join(' + ')}catch{return '—'}}
function visible(){let q=$('#search').value.trim().toLowerCase(),l=$('#language').value;return leads.filter(x=>(!l||x.language===l)&&(!q||[x.email,x.phone,x.country].some(v=>String(v||'').toLowerCase().includes(q))))}
function render(){let a=visible();$('#rows').innerHTML=a.map(x=>`<tr><td>${new Date(x.created_at).toLocaleString('ru-RU')}</td><td>${esc(x.email)}</td><td>${esc(x.phone)}</td><td class="lang">${esc(x.language)}</td><td class="packs">${esc(packages(x.portfolio_packages))}</td><td>$${Number(x.portfolio_total).toLocaleString('en-US')}</td><td>${Number(x.portfolio_weight).toLocaleString('en-US')}</td><td>${esc(x.country||'—')}</td></tr>`).join('');$('#empty').style.display=a.length?'none':'block';$('#count').textContent=leads.length;$('#amount').textContent='$'+leads.reduce((s,x)=>s+Number(x.portfolio_total),0).toLocaleString('en-US');$('#units').textContent=leads.reduce((s,x)=>s+Number(x.portfolio_weight),0).toLocaleString('en-US');$('#today').textContent=leads.filter(x=>Date.now()-new Date(x.created_at)<864e5).length}
async function load(){let r=await fetch('/api/admin/leads',{headers:{authorization:'Bearer '+token}});if(r.status===401)throw Error('Неверный пароль');if(!r.ok)throw Error('Не удалось загрузить заявки');leads=(await r.json()).leads;$('#login').style.display='none';$('#dashboard').style.display='block';sessionStorage.setItem('adminToken',token);render()}
$('#enter').onclick=async()=>{token=$('#password').value;$('#loginError').textContent='';try{await load()}catch(e){$('#loginError').textContent=e.message}};$('#password').onkeydown=e=>{if(e.key==='Enter')$('#enter').click()};$('#refresh').onclick=()=>load();$('#search').oninput=render;$('#language').onchange=render;$('#logout').onclick=()=>{sessionStorage.clear();location.reload()};
$('#csv').onclick=()=>{let cols=['created_at','email','phone','language','portfolio_packages','portfolio_total','portfolio_weight','country'],q=v=>'"'+String(v??'').replaceAll('"','""')+'"',csv=[cols.join(','),...visible().map(x=>cols.map(k=>q(k==='portfolio_packages'?packages(x[k]):x[k])).join(','))].join('\n'),a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv'}));a.download='dark-ai-tokens-leads.csv';a.click();URL.revokeObjectURL(a.href)};
if(token)load().catch(()=>sessionStorage.clear());
</script></body></html>
