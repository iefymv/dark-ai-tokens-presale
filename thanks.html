ли телефону после рассмотрения заявок в первый пул.',back:'ВЕРНУТЬСЯ НА САЙТ'},es:{status:'SOLICITUD // RECIBIDA',title:'Solicitud recibida',text:'Tu solicitud fue guardada. Te contactaremos por email o teléfono después de revisar las solicitudes para el primer pool.',back:'VOLVER AL SITIO'}}[lang];document.documentElement.lang=lang==='es'?'es-419':lang;for(const k of ['status','title','text','back'])document.getElementById(k).textContent=t[k];document.getElementById('back').href='/?lang='+lang;</script></body></html>
